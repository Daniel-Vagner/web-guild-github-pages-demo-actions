name: Deploy Blazor WASM to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish Blazor WASM
        run: dotnet publish GitHub-Pages-demo/GitHub-Pages-demo.Client/GitHub-Pages-demo.Client.csproj -c Release -o publish

      - name: Copy server static assets
        run: |
          cp -r GitHub-Pages-demo/GitHub-Pages-demo/wwwroot/lib publish/wwwroot/lib
          cp GitHub-Pages-demo/GitHub-Pages-demo/wwwroot/app.css publish/wwwroot/app.css
          cp GitHub-Pages-demo/GitHub-Pages-demo/wwwroot/favicon.png publish/wwwroot/favicon.png

      - name: Create 404.html for client-side routing
        run: cp publish/wwwroot/index.html publish/wwwroot/404.html

      - name: Add .nojekyll
        run: touch publish/wwwroot/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
